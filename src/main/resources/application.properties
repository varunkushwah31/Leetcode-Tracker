spring.application.name=tracker
spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/LeetcodeTracker}
spring.data.mongodb.auto-index-creation=true

# b (You can generate a new one for production later)
application.security.jwt.secret-key=${JWT_SECRET:26f282adb0381c2953321159ed7dd356077ae25e28a59524088eae41ca7df3c9}


# Access Token Expiration (15 minutes = 900000 ms)
application.security.jwt.expiration=${JWT_EXPIR:900000}

# JWT Refresh Token Expiration (7 days = 604800000 ms)
application.security.jwt.refresh-token.expiration=${JWT_REFRESH_EXPIR:604800000}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-placeholder-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-placeholder-secret}
spring.security.oauth2.client.registration.google.scope=profile, email

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==================== REDIS CONFIGURATION ====================
# Redis server connection details
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=60000ms

# Redis connection pool configuration
spring.data.redis.jedis.pool.max-active=${REDIS_POOL_MAX_ACTIVE:8}
spring.data.redis.jedis.pool.max-idle=${REDIS_POOL_MAX_IDLE:8}
spring.data.redis.jedis.pool.min-idle=${REDIS_POOL_MIN_IDLE:0}
spring.data.redis.jedis.pool.max-wait=${REDIS_POOL_MAX_WAIT:-1ms}

# ==================== CACHING CONFIGURATION ====================
# Enable Spring Cache abstraction with Redis backend
spring.cache.type=redis

# Cache properties for TTL management
spring.cache.redis.time-to-live=600000

# Log cache operations for debugging (set to true if needed)
spring.cache.log-level=DEBUG
