services:
  # Redis
  redis:
    image: redis:latest
    container_name: mentorsync-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend
  backend:
    build:
      context: .
    container_name: mentorsync-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_REPOSITORIES_ENABLED: "false"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped